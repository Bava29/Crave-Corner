    <!DOCTYPE html>
    <html lang="en">

    <head>

        <meta charset="UTF-8">

        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Login | Crave Corner</title>

        <!-- Google Font -->

        <link rel="preconnect" href="https://fonts.googleapis.com">

        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
            rel="stylesheet">

        <!-- Font Awesome -->

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

        <!-- CSS -->

        <link rel="stylesheet" href="css/style.css">

    </head>

    <body>

        <!---------------- LOGIN ---------------->

        <section class="login-page">

            <div class="login-card">

                <!-- Logo -->

                <a href="index.html" class="login-logo">

                    <img src="images/logo.png" alt="Crave Corner">

                </a>

                <span class="login-tag">

                    Welcome Back

                </span>

                <h1>

                    Sign In To Your Account

                </h1>

                <p>

                    Login to continue your sweet journey with Crave Corner.

                </p>

                <!-- Form -->

                <form>

                    <div class="input-box">

                        <label>Email Address</label>

                        <input type="email" placeholder="Enter your email">

                    </div>

                    <div class="input-box password-box">

                        <label>Password</label>

                        <input type="password" id="password" placeholder="Enter your password">

                        <button type="button" class="toggle-password">

                            <i class="fa-solid fa-eye"></i>

                        </button>

                    </div>

                    <div class="login-options">

                        <label class="remember">

                            <input type="checkbox">

                            Remember Me

                        </label>

                        <a href="forgot-password.html">

                            Forgot Password?

                        </a>

                    </div>

                    <button class="primary-btn login-btn">

                        Login

                    </button>

                </form>

                <!-- Divider -->

                <div class="divider">

                    <span>Or Continue With</span>

                </div>

                <!-- Social Login -->

                <div class="social-login">

                    <a href="#" class="social-btn google">

                        <img src="images/google-logo.svg" alt="Google">

                    </a>

                    <a href="#" class="social-btn facebook">
                        <i class="fa-brands fa-facebook-f"></i>
                    </a>

                    <a href="#" class="social-btn apple">
                        <i class="fa-brands fa-apple"></i>
                    </a>

                    <a href="#" class="social-btn x">
                        <i class="fa-brands fa-x-twitter"></i>
                    </a>

                </div>
                <!-- Bottom -->

                <div class="login-footer">

                    <p>

                        Don't have an account?

                        <a href="register.html">

                            Create Account

                        </a>

                    </p>

                </div>

            </div>

        </section>




        <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>


        <script src="js/auth.js"></script>
        <script src="js/main.js"></script>


    </body>

    </html>
