<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title -->
    <title>Crave Corner</title>

    <!-- SEO -->
    <meta name="description"
        content="Crave Corner offers delicious ice creams, waffles, sundaes, desserts, milkshakes, and refreshing beverages in a fun and colorful cafe atmosphere.">

    <meta name="keywords"
        content="Ice Cream, Dessert Cafe, Waffles, Sundaes, Milkshakes, Brownies, Coffee, Crave Corner">

    <meta name="author" content="Crave Corner">

    <!-- Favicon -->
    <link rel="icon" href="images/logo.png" type="image/png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- AOS Animation -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">

    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>


    <!---------------- REGISTER ---------------->

    <section class="register-page">

        <div class="auth-page-controls">

            <button id="theme-toggle" class="control-btn" aria-label="Toggle Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>

            <button id="rtl-toggle" class="control-btn" aria-label="Toggle RTL">
                <i class="fa-solid fa-right-left"></i>
            </button>

        </div>

        <div class="register-card">

            <!-- Logo -->

            <a href="index.html" class="register-logo">

                <img src="images/logo.png" alt="Crave Corner">

            </a>

            <!-- Badge -->

            <span class="register-tag">

                Join Crave Corner

            </span>

            <!-- Heading -->

            <h1>

                Create Your Account

            </h1>

            <p>

                Sign up to discover handcrafted desserts, exclusive offers,
                and unforgettable sweet experiences.

            </p>

            <!-- Register Form -->

            <form class="register-form">

                <div class="register-input">

                    <label>Full Name</label>

                    <input type="text" placeholder="Enter your full name">

                </div>

                <div class="register-input">

                    <label>Email Address</label>

                    <input type="email" placeholder="Enter your email">

                </div>

                <div class="register-input">

                    <label>Phone Number</label>

                    <input type="tel" placeholder="Enter your phone number">

                </div>

                <div class="register-input register-password-box">

                    <label>Password</label>

                    <input type="password" id="registerPassword" placeholder="Create your password">

                    <button type="button" class="register-toggle-password">

                        <i class="fa-solid fa-eye"></i>

                    </button>

                </div>

                <div class="register-input register-password-box">

                    <label>Confirm Password</label>

                    <input type="password" id="confirmPassword" placeholder="Confirm your password">

                    <button type="button" class="register-confirm-password">

                        <i class="fa-solid fa-eye"></i>

                    </button>

                </div>

                <div class="register-options">

                    <label class="register-checkbox">

                        <input type="checkbox">

                        I agree to the
                        <a href="#">Terms & Conditions</a>

                    </label>

                </div>

                <button type="submit" class="primary-btn register-btn">

                    Create Account

                </button>

            </form>

            <!-- Divider -->

            <div class="register-divider">

                <span>

                    Or Sign Up With

                </span>

            </div>

            <!-- Social Icons -->



            <div class="register-social">

                <a href="#" class="register-social-icon google">

                    <img src="images/google-logo.svg" alt="Google">

                </a>


                <a href="#" class="register-social-icon facebook">

                    <i class="fa-brands fa-facebook-f"></i>

                </a>

                <a href="#" class="register-social-icon apple">

                    <i class="fa-brands fa-apple"></i>

                </a>

                <a href="#" class="register-social-icon x-twitter">

                    <i class="fa-brands fa-x-twitter"></i>

                </a>

            </div>

            <!-- Bottom -->

            <div class="register-footer">

                <p>

                    Already have an account?

                    <a href="login.html">

                        Login

                    </a>

                </p>

            </div>

        </div>

    </section>


    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>


    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>


</body>

</html>
